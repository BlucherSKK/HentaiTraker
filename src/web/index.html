<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Сайт</title>
    <style>
        /* Цветовая палитра и ресурсы */
        :root {
            --bg-main: #f4f7f6;
            --bg-card: #ffffff;
            --bg-nav: lightslategray;
            --bg-nav-hover: lightpink;
            --text-main: #333333;
            --text-header: #2c3e50;
            --text-secondary: #666666;
            --accent-color: #3498db;
            --border-color: #eeeeee;
            --shadow-color: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        /* Логотип */
        header {
            text-align: center;
            padding: 30px 20px;
            background-color: var(--bg-card);
        }

        .logo-img {
            height: 100px; /* Регулируй высоту логотипа здесь */
            width: auto;
            display: block;
            margin: 0 auto;
        }

        .pixelated {
            /* Для Safari и старых версий iOS */
            image-rendering: -webkit-optimize-contrast;

            /* Для Firefox */
            image-rendering: crisp-edges;

            /* Стандартное свойство (работает в Chrome, Edge, Opera) */
            /* Оно заставляет браузер использовать метод "ближайшего соседа" при масштабировании */
            image-rendering: pixelated;

            /* Убираем сглаживание, если оно применяется */
            -ms-interpolation-mode: nearest-neighbor; /* Для старых IE */
        }

        /* Навигация */
        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            background-color: var(--bg-nav);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
            font-size: 14px;
        }

        nav a:hover {
            background-color: var(--bg-nav-hover);
        }

        /* Контейнер и карточки */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--bg-card);
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px var(--shadow-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
        }

        .card:hover {
            transform: scale(1.01);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card-content h3 {
            margin: 0 0 5px 0;
            color: var(--text-header);
        }

        .card-content p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .arrow {
            font-size: 20px;
            color: var(--accent-color);
        }

        @media (max-width: 600px) {
            .card { text-align: center; flex-direction: column; }
            .arrow { display: none; }
        }
    </style>
</head>
